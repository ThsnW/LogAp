spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:logap_fleet}
    username: ${DB_USER:logap}
    password: ${DB_PASSWORD:logap123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:mySuperSecretKeyForJWTTokenGeneration2024LogApFleetManagementSystemKey}
    expiration-ms: 86400000
